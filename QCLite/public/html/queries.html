<!doctype html>
{{template "html"}}

<head>
  <!-- Required meta tags -->
  {{template "meta"}}
  <!-- Bootstrap CSS -->
  {{template "styles"}}

  {{template "title"}}
</head>

<body>
  {{template "navbar"}}
  <div class="container-fluid">

    <!--ЗАГОЛОВОК-->
    <div class="row mt-3">
      <div class="col">
        <p class="text-center font-weight-bold">ЗАПРОСЫ</p>
      </div>
    </div>
    
    {{if .Data}}
    <div class="row">
      <div class="col-sm">
        <table class="table table-sm">
          <thead class="thead-light ">
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Название</th>
              <!--<th scope="col">Запрос</th>-->
              <th scope="col">Описание</th>
              <th scope="col"></th>
              <th scope="col"></th>
            </tr>
          </thead>

          <tbody>
            {{range .Data }}
            <tr>
              <td>{{ .ID}}</a></td>
              <td>{{ .NAME}}</td>
              <!--<td>{{ .QUERY}}</td>-->
              <td>{{ .REM}}</td>
              <td><a href="/query?mode=view&ID={{.ID}}" target="_self">Изменить</a></td>
              <td><a href="/query?mode=execute&ID={{.ID}}" target="_self">Выполнить</a></td>
            </tr>
            {{end}}
          </tbody>
        </table>
      </div>
    </div>
    {{end}}

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    {{template "scripts"}}
  </div>
</body>

</html>
