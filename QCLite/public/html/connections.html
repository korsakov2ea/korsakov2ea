<!doctype html>
{{template "html"}}

<head>
  <!-- Required meta tags -->
  {{template "meta"}}
  <!-- Bootstrap CSS -->
  {{template "styles"}}

  {{template "title"}}
</head>

<body>
  {{template "navbar"}}
  <div class="container-fluid">

    <!--ЗАГОЛОВОК-->
    <div class="row mt-3">
      <div class="col">
        <p class="text-center font-weight-bold">СОЕДИНЕНИЯ</p>
      </div>
    </div>
    
    {{if .Data }}
    <div class="row">
      <div class="col-sm">
        <table class="table table-sm">
          <thead class="thead-light ">
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Наименовение</th>
              <th scope="col">Драйвер</th>
              <th scope="col">DSN</th>
              <th scope="col"></th>
            </tr>
          </thead>

          <tbody>
            {{range .Data }}
            <tr>
              <td>{{ [0]}}</a></td>
              <td>{{ [1]}}</td>
              <td>{{ [2]}}</td>
              <td>{{ [3]}}</td>
              <td><a href="/connection?mode=view&ID={{[0]}}" target="_self">Изменить</a></td>
            </tr>
            {{end}}
          </tbody>
        </table>
      </div>
    </div>
    {{end}}

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    {{template "scripts"}}
  </div>
</body>

</html>
