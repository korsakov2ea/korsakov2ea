<!doctype html>
{{template "html"}}

<head>
  <!-- Required meta tags -->
  {{template "meta"}}
  <!-- Bootstrap CSS -->
  {{template "styles"}}

  {{template "title"}}
</head>

<body>
  <div class="container-fluid">

    <!--ЗАГОЛОВОК-->
    <div class="row mt-3">
      <div class="col">
        <p class="text-center font-weight-bold">СОЕДИНЕНИЯ</p>
      </div>
    </div>

    <div class="row">
      <div class="col-sm">
        <form class="form-inline" method="POST" enctype="application/x-www-form-urlencoded">
          <div class="form-group mb-2">
            <input type="hidden" name="formType" value="find">
            <input type="text" class="form-control mr-3" name="Name" placeholder="Наименование">
            <input type="text" class="form-control mr-3" name="Driver" placeholder="Драйвер">
            <input type="text" class="form-control mr-3" name="DSN" placeholder="DSN">
          </div>
          <button type="submit" class="btn btn-primary mb-2">Создать</button>
        </form>
      </div>
    </div>  

    {{if .}}
    <div class="row">
      <div class="col-sm">
        <table class="table table-sm">
          <thead class="thead-light ">
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Наименовение</th>
              <th scope="col">Драйвер</th>
              <th scope="col">DSN</th>
            </tr>
          </thead>

          <tbody>
            {{range . }}
            <tr>
              <td><a href="/viewReestrMIC?ID={{.ID}}" target="_self">{{ .ID}}</a></td>
              <td>{{ .NAME}}</td>
              <td>{{ .DRIVER}}</td>
              <td>{{ .DSN}}</td>
            </tr>
            {{end}}
          </tbody>
        </table>
      </div>
    </div>
    {{end}}

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    {{template "scripts"}}
  </div>
</body>

</html>
