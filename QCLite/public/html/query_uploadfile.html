<!doctype html>
{{template "html"}}

<head>
  <!-- Required meta tags -->
  {{template "meta"}}
  <!-- Bootstrap CSS -->
  {{template "styles"}}

  {{template "title"}}
</head>

<body>
  {{template "navbar"}}
  <div class="container-fluid">

    <!--ЗАГОЛОВОК-->
    <div class="row mt-3">
      <div class="col">
        <p class="text-center font-weight-bold">ЗАГРУЗКА ФАЙЛА</p>
      </div>
    </div>

    <div class="row">
      <div class="col-sm">
        <form method="POST" enctype="multipart/form-data">
          <div class="custom-file col-6 pl-0">
              <input type="file" class="form-control-file border" name="uploadFile">
          </div>
          <button type="submit" class="btn btn-primary mb-2" name="submitBtn" value="uploadExecute">Загрузить и показать результат</button>
          <button type="submit" class="btn btn-primary mb-2" name="submitBtn" value="uploadDownload">Загрузить и выгрузить результат </button>
        </form>
      </div>
    </div>
    
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    {{template "scripts"}}
  </div>
</body>

</html>
