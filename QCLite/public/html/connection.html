<!doctype html>
{{template "html"}}

<head>
  <!-- Required meta tags -->
  {{template "meta"}}
  <!-- Bootstrap CSS -->
  {{template "styles"}}

  {{template "title"}}
</head>

<body>
  <div class="container-fluid">

    <!--ЗАГОЛОВОК-->
    <div class="row mt-3">
      <div class="col">
        <p class="text-center font-weight-bold">СОЗДАНИЕ, ИЗМЕНЕНИЕ, УДАЛЕНИЯ СОЕДИНЕНИЯ</p>
      </div>
    </div>

    <!-- Modal delete confinm-->
    <div class="modal fade" id="addModal" tabindex="-1" role="dialog" aria-labelledby="addModalLabel"
      aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">

          <div class="modal-header">
            <h5 class="modal-title" id="addModalLabel">Удаление соедиения</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>

          <div class="modal-body">
             Соединение будет навсегда удалено из базы данных. Подтвердите удаление?
          </div>

          <div class="modal-footer">
            <form method="POST" enctype="application/x-www-form-urlencoded">
              <button type="button" class="btn btn-secondary" data-dismiss="modal">Отмена</button>
              <button type="submit" class="btn btn-primary" name="submitBtn" value="Delete">Удалить</button>
            </form>
          </div>

        </div>
      </div>
    </div>

    {{if .}}
    {{range . }}
    <div class="row">
      <div class="col-sm">

        <form method="POST" enctype="application/x-www-form-urlencoded">
          <input type="text" class="form-control mb-3" name="Name" placeholder="Наименование" value="{{ .NAME}}">
          <input type="text" class="form-control mb-3" name="Driver" placeholder="Драйвер" value="{{ .DRIVER}}">
          <input type="text" class="form-control mb-3" name="DSN" placeholder="DSN" value="{{ .DSN}}">
          <button type="submit" class="btn btn-secondary" name="submitBtn" value="Cancel">Отмена</button>
          <button type="submit" class="btn btn-primary" name="submitBtn" value="Create">Создать</button>
          <button type="submit" class="btn btn-primary" name="submitBtn" value="Update">Изменить</button>
          <!--
              <button type="submit" class="btn btn-primary" name="submitBtn" value="Delete">Удалить</button>
            -->
          <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#addModal">Удалить</button>

        </form>

      </div>
    </div>
    {{end}}
    {{end}}

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    {{template "scripts"}}
  </div>
</body>

</html>
