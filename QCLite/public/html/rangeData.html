<!doctype html>
{{template "html"}}
  <head>
    <!-- Required meta tags -->
    {{template "meta"}}
    <!-- Bootstrap CSS -->
    {{template "styles"}}

    {{template "title"}}
</head>
<body>
    
    
    <div class="container-fluid">
        <!--ЗАГОЛОВОК-->
      <div class="row mt-3">
        <div class="col">
          <p class="text-center font-weight-bold">Список запросов</p>
        </div>
      </div>
     
     
    {{if .}}
    <div class="row">
      <div class="col-sm">
        <table class="table table-sm">
          <thead class="thead-light ">
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Описание</th>
              <th scope="col">Запрос</th>
              <th scope="col">Соединение</th>
            </tr>
          </thead>
          <tbody>
          {{range . }}
            <tr>
              <td><a href="/viewReestrMIC?ID={{.ID}}"  target="_self">{{ .ID}}</a></td>
              <td>{{ .REM}}</td>
              <td>{{ .QUERY}}</td>
              <td>{{ .NAME}}</td>
            </tr>
          {{end}}
          </tbody>  
        </table>
      </div>
    </div>  
    {{end}}

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    {{template "scripts"}}
  </body>
</html>
